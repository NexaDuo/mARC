name: CI

# First CI for NexaDuo/mARC (issue #5).
# Proves — deterministically and at ZERO token cost — that the mARC plugin
# VALIDATES, INSTALLS, and REGISTERS its skill/agents, including cross-repo.
# There is no official Claude Code GitHub Action; we install the CLI via npm.
#
# Scope: Tier 1 (structural) + Tier 2 (install / cross-repo). No Tier 3
# (headless execution) — that needs ANTHROPIC_API_KEY + real API cost and lives
# in the disabled `execution-eval.yml` stub.
#
# Empirical finding (verified in-workflow, see the "auth boundary" step below):
# `claude plugin install marc@nexaduo` runs WITHOUT ANTHROPIC_API_KEY and makes
# no token-costing API call — it only clones/copies the marketplace repo. So the
# gate uses the REAL install path and needs NO secret.

on:
  push:
  pull_request:

# Nothing here reads or needs any secret. Keep it that way (Tier 1 + Tier 2).
permissions:
  contents: read

env:
  # Pin the CLI for reproducibility. BUMP: bump this to adopt a newer Claude Code
  # (latest verified working: 2.1.200). Node 22+ is required by the CLI.
  CLAUDE_CODE_VERSION: "2.1.200"

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 — structural. Hard gate, no secret, no `claude` install needed except
  # for `plugin validate`.
  # ---------------------------------------------------------------------------
  structural:
    name: Tier 1 — structural
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI (pinned)
        run: |
          npm i -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
          claude --version

      # 2. Plugin manifest validation. `--bare` for reproducible output.
      #    NOTE: we intentionally do NOT pass `--strict`: the manifest carries a
      #    `minimumVersion` field that the runtime tolerates but reports as an
      #    "unknown field" warning. That warning is expected and benign — do not
      #    "fix" it by deleting the field.
      - name: claude plugin validate
        run: claude --bare plugin validate harnesses/claude-code/marc

      # 3. Both JSON manifests must parse.
      - name: jq parse manifests
        run: |
          jq . .claude-plugin/marketplace.json > /dev/null
          jq . harnesses/claude-code/marc/.claude-plugin/plugin.json > /dev/null

      # 3b. team.config schema contract. `/marc:init` (skills/init) prefills a
      #     `.claude/team.config` from this canonical example, so the schema must
      #     stay parseable as `key=value` and keep the required GitHub-binding
      #     keys. This is a deterministic proxy for the generated file; validating
      #     an actual /marc:init run needs a live model (Tier 3, out of CI scope).
      - name: team.config schema contract
        run: |
          # Reusable assertion so we can also run a NEGATIVE test on a fixture.
          # Asserts a team.config-style file is a clean key=value schema:
          #   - every non-comment/non-blank line is `key=value`
          #   - NO inline comment on a value line (naïve parser would eat it)
          #   - required GitHub-binding keys present (gh_org, gh_repo)
          # Deterministic, zero token cost — no live model run.
          check_schema() {
            f="$1"
            test -f "$f" || { echo "::error::$f missing"; return 1; }
            # value lines = non-blank, not starting with optional-ws then '#'.
            vlines="$(grep -vE '^\s*(#|$)' "$f")"
            # (a) every value line is key=value.
            if printf '%s\n' "$vlines" | grep -vqE '^[A-Za-z_][A-Za-z0-9_]*=.*$'; then
              printf '%s\n' "$vlines" | grep -vE '^[A-Za-z_][A-Za-z0-9_]*=.*$'
              echo "::error::$f has a non key=value line"; return 1
            fi
            # (b) no inline comment on a value line: a '#' anywhere on a value
            #     line means a comment was left inline after key=value.
            if printf '%s\n' "$vlines" | grep -qE '#'; then
              printf '%s\n' "$vlines" | grep -nE '#'
              echo "::error::$f has an inline comment on a key=value line (comments must be on their own line)"; return 1
            fi
            # (c) required keys present.
            for k in gh_org gh_repo; do
              grep -qE "^${k}=" "$f" || { echo "::error::$f missing required key: $k"; return 1; }
            done
            return 0
          }

          # POSITIVE: the canonical example must pass.
          check_schema docs/team.config.example \
            || { echo "::error::team.config.example failed schema contract"; exit 1; }

          # NEGATIVE: a fixture with an inline-comment value line MUST fail (b),
          # proving the gate actually catches the dogfood bug it exists for.
          tmp="$(mktemp)"
          printf '%s\n' \
            '# fixture: inline comment on a value line must be rejected' \
            'gh_org=YourOrg' \
            'gh_repo=YourOrg/your-repo' \
            'app_paths=infra/ # Pulumi' > "$tmp"
          if check_schema "$tmp" > /dev/null 2>&1; then
            echo "::error::negative test FAILED — inline-comment fixture was NOT rejected"; rm -f "$tmp"; exit 1
          fi
          rm -f "$tmp"

          echo "team.config schema contract: OK (key=value; no inline comments; gh_org/gh_repo present; negative test rejected inline comment)."

      # 4. YAML frontmatter lint of every agent + skill file. Extracts the
      #    `---`-delimited frontmatter and yaml.safe_load()s it. This catches the
      #    class of bug where an unquoted `": "` inside a `description:` value
      #    (e.g. the old security.md) makes the frontmatter invalid YAML and
      #    silently breaks `plugin validate`.
      - name: YAML frontmatter lint
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          files = sorted(
              glob.glob("harnesses/claude-code/marc/agents/*.md")
              + glob.glob("harnesses/claude-code/marc/skills/**/SKILL.md", recursive=True)
          )
          if not files:
              print("ERROR: no agent/skill files found — glob paths wrong?")
              sys.exit(1)
          bad = 0
          for f in files:
              text = open(f, encoding="utf-8").read()
              if not text.startswith("---"):
                  print(f"FAIL {f}: missing frontmatter (no leading '---')")
                  bad += 1
                  continue
              # frontmatter = between the first '---' and the next '---' line
              parts = text.split("\n")
              try:
                  end = parts.index("---", 1)
              except ValueError:
                  print(f"FAIL {f}: unterminated frontmatter (no closing '---')")
                  bad += 1
                  continue
              fm = "\n".join(parts[1:end])
              try:
                  data = yaml.safe_load(fm)
              except yaml.YAMLError as e:
                  print(f"FAIL {f}: frontmatter is not valid YAML: {e}")
                  bad += 1
                  continue
              if not isinstance(data, dict) or "name" not in data:
                  print(f"FAIL {f}: frontmatter missing required 'name' key")
                  bad += 1
                  continue
              print(f"ok   {f}")
          if bad:
              print(f"\n{bad} file(s) failed frontmatter lint")
              sys.exit(1)
          print(f"\nAll {len(files)} frontmatter block(s) parsed OK")
          PY

      # 5. Anti-anchoring gate: the reusable, cross-repo agent/skill ROLE prose
      #    must not hardcode this-repo/consumer specifics. The NexaDuo name is
      #    allowed in the manifests / README / install.sh (branding); the gate is
      #    scoped to agents/ + skills/ prose only.
      - name: Anti-anchoring grep gate
        run: |
          if grep -rniE 'nexaduo|chat-services|run-stack|middleware/|chatwoot|dify|instagram' \
               harnesses/claude-code/marc/agents \
               harnesses/claude-code/marc/skills; then
            echo "::error::Anti-anchoring gate: consumer/this-repo specifics found in agent/skill role prose (see hits above)."
            exit 1
          fi
          echo "Anti-anchoring gate: clean (zero hits)."

      # 5b. Self-improvement context-gating gate (issue #20). The tech-lead skill
      #     MUST gate its "capture process improvements into versioned source /
      #     buffer-flush" behavior by context: plugin self-edits + upstream PRs
      #     are legitimate ONLY in the plugin's own source repo (dogfooding); in a
      #     consumer repo the operator MUST NOT edit the plugin or open autonomous
      #     upstream PRs. This asserts the guard prose survives edits. Deterministic,
      #     zero token cost — a grep over required guard phrases, no live model.
      - name: Self-improvement context-gating gate
        run: |
          SKILL=harnesses/claude-code/marc/skills/tech-lead/SKILL.md
          # Reusable check: every required guard phrase must be present in $1.
          # Phrases are matched case-insensitively, each on its own line in the
          # source, so a whole-file scan is unnecessary.
          check_guard() {
            f="$1"
            test -f "$f" || { echo "::error::$f missing"; return 1; }
            # (a) context detection is present and generic (runtime plugin.json probe).
            grep -qiE 'gated by context' "$f" \
              || { echo "::error::$f missing 'gated by context' rule"; return 1; }
            grep -qiE '\.claude-plugin/plugin\.json' "$f" \
              || { echo "::error::$f missing plugin.json context-detection probe"; return 1; }
            # (b) explicit prohibition on editing the plugin from a consumer repo.
            grep -qiE 'MUST NOT.*edit the plugin' "$f" \
              || { echo "::error::$f missing 'MUST NOT edit the plugin' prohibition"; return 1; }
            # (c) explicit prohibition on autonomous upstream PRs from a consumer repo.
            grep -qiE 'autonomous upstream pull request' "$f" \
              || { echo "::error::$f missing 'autonomous upstream pull request' prohibition"; return 1; }
            # (d) upstream-worthy lessons deferred to the sanctioned opt-in channel.
            grep -qiE 'issue #22' "$f" \
              || { echo "::error::$f missing deferral to the opt-in upstream channel (issue #22)"; return 1; }
            return 0
          }

          # POSITIVE: the shipped SKILL.md must carry every guard phrase.
          check_guard "$SKILL" \
            || { echo "::error::tech-lead SKILL.md failed the context-gating guard"; exit 1; }

          # NEGATIVE: a copy with the upstream-PR prohibition stripped MUST fail,
          # proving the gate actually catches regression of the guard prose.
          tmp="$(mktemp)"
          grep -v 'autonomous upstream pull request' "$SKILL" > "$tmp"
          if check_guard "$tmp" > /dev/null 2>&1; then
            echo "::error::negative test FAILED — guard passed after prohibition was removed"; rm -f "$tmp"; exit 1
          fi
          rm -f "$tmp"

          echo "Context-gating gate: OK (detection + edit/upstream-PR prohibition + #22 deferral present; negative test caught removal)."

      # 6. Installer script static checks.
      - name: shellcheck + bash -n install.sh
        run: |
          shellcheck install.sh
          bash -n install.sh

      # 7. Wordmark parity gate: the block-letter "mARC" wordmark is a copy-paste
      #    duplicate across three surfaces (README banner, install.sh banner,
      #    docs/index.html hero). They MUST stay byte-identical so the brand mark
      #    never drifts. (Decision on issue #11, REVISED 2026-07-04 by maintainer:
      #    the leading glyph is now a bespoke lowercase x-height "m" (Candidate A)
      #    rendered in the ANSI Shadow idiom (█ fills + ╗║╚═╝ edges) beside the
      #    full-height "ARC" — m-width 11, total 38 cols, all unchanged from the
      #    old cap-M. This REVERSES the earlier keep-uppercase call: a design pass
      #    showed the x-height "m" stays on-grid and preserves the shadow style
      #    without breaking it. Brand case "mARC" is still reinforced by the
      #    aria-label + all prose/taglines.)
      - name: Wordmark parity gate
        run: |
          python3 - <<'PY'
          import sys
          FILES = ["README.md", "install.sh", "docs/index.html"]
          def block(path):
              lines = open(path, encoding="utf-8").read().split("\n")
              # first row of the block is the "A" apex "█████╗": the leading
              # lowercase "m" is blank on its top two rows, so the block's row 0
              # is the ARC apex (the old cap-M top "███╗" no longer exists).
              start = next(i for i, l in enumerate(lines) if l.lstrip().startswith("█████╗"))
              # normalise trailing whitespace only: rows 3-4 legitimately shorter (C is open on the right)
              return [l.rstrip() for l in lines[start:start + 6]]
          ref = block(FILES[0])
          bad = False
          for f in FILES:
              b = block(f)
              if b != ref:
                  print(f"FAIL {f}: wordmark block differs from {FILES[0]}")
                  for r, (x, y) in enumerate(zip(ref, b)):
                      if x != y:
                          print(f"  row{r+1}: {FILES[0]!r}={x!r}  {f!r}={y!r}")
                  bad = True
              else:
                  print(f"ok   {f}")
          if bad:
              print("\nWordmark parity gate: FAILED — the three wordmark surfaces have drifted.")
              sys.exit(1)
          print("\nWordmark parity gate: all three surfaces carry an identical 6-row block wordmark.")
          PY

      # 8. CHANGELOG parity gate (issue #26): the shipped plugin version and the
      #    CHANGELOG must never drift. Fail if `plugin.json` `.version` has no
      #    matching `## [X.Y.Z]` section in CHANGELOG.md. This is the regression
      #    guard for the release surface — a version bump that forgets its
      #    CHANGELOG section (and therefore its Release body) is caught here on
      #    the PR, before a tag is ever cut. Deterministic, zero token cost.
      - name: CHANGELOG parity gate
        run: |
          PLUGIN=harnesses/claude-code/marc/.claude-plugin/plugin.json
          CHANGELOG=CHANGELOG.md
          # Reusable assertion: version $1 has a `## [$1]` section in $2.
          check_parity() {
            v="$1"; f="$2"
            test -f "$f" || { echo "::error::$f missing"; return 1; }
            # Anchor on the exact section header; the `[` is a literal, so escape
            # it in the regex. Keep-a-Changelog header is `## [X.Y.Z] - date`.
            grep -qE "^## \[${v}\]" "$f" \
              || { echo "::error::$f has no '## [${v}]' section for plugin version ${v}"; return 1; }
            return 0
          }

          VERSION="$(jq -r .version "$PLUGIN")"
          test -n "$VERSION" && test "$VERSION" != "null" \
            || { echo "::error::could not read .version from $PLUGIN"; exit 1; }

          # POSITIVE: the shipped version must have its CHANGELOG section.
          check_parity "$VERSION" "$CHANGELOG" \
            || { echo "::error::CHANGELOG parity gate: plugin.json version ${VERSION} has no matching CHANGELOG section"; exit 1; }

          # NEGATIVE: a version that is deliberately NOT in the CHANGELOG MUST
          # fail, proving the gate actually catches drift.
          if check_parity "9.9.9-nonexistent" "$CHANGELOG" > /dev/null 2>&1; then
            echo "::error::negative test FAILED — parity gate passed for a version with no CHANGELOG section"; exit 1
          fi

          echo "CHANGELOG parity gate: OK (plugin.json ${VERSION} has a '## [${VERSION}]' section; negative test rejected a missing version)."

      # 9. actionlint — workflow schema + expression lint. Plain YAML parsing
      #    (jq/yaml.safe_load) accepts a file that GitHub's stricter workflow
      #    schema rejects at load time (a "startup_failure": no jobs ever run).
      #    release.yml regressed exactly this way — an empty `${{ }}` expression
      #    inside a run: block is valid YAML but an invalid Actions expression.
      #    This gate catches that class of bug on the PR. Pinned + checksum-
      #    verified (no curl|bash, no unpinned third-party action).
      - name: actionlint (workflow schema + expression lint)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.7
          ACTIONLINT_SHA256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sSLo "$tarball" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar xzf "$tarball" actionlint
          # Lint every workflow under .github/workflows/ for GitHub's workflow
          # SCHEMA + EXPRESSION validity (the startup_failure class). We disable
          # actionlint's embedded shellcheck/pyflakes integrations (-shellcheck=
          # / -pyflakes=): those impose shell/python STYLE on run: scripts (e.g.
          # SC2015 on the intentional `check … || { echo; exit 1; }` pattern used
          # throughout this file) and are out of scope here — install.sh already
          # has a dedicated shellcheck step. Expression checks (e.g. an empty
          # Actions expression) are unaffected and still fail the gate.
          ./actionlint -color -shellcheck= -pyflakes=

  # ---------------------------------------------------------------------------
  # Tier 2 — install + cross-repo. Prefer no-auth. Uses an isolated,
  # workspace-local CLAUDE_CONFIG_DIR so nothing leaks between steps/runners.
  # ---------------------------------------------------------------------------
  install:
    name: Tier 2 — install + cross-repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI (pinned)
        run: |
          npm i -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
          claude --version

      # 9. Empirically determine the auth boundary, IN the runner, and record it
      #    in the job log. This is the actual proof behind "no secret needed".
      #    Runs with ANTHROPIC_API_KEY explicitly unset. If any step here failed
      #    for lack of auth, the job would go red and we'd fall back per issue #5.
      - name: Empirical auth-boundary probe (no ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ""
          CLAUDE_CONFIG_DIR: ${{ github.workspace }}/.marc-probe
        run: |
          set -x
          mkdir -p "$CLAUDE_CONFIG_DIR"
          # These three are the whole Tier-2 chain; if install needed a key it
          # would fail here with the key unset.
          claude plugin marketplace add ./
          claude plugin install marc@nexaduo
          claude plugin list --json | jq -e '.[] | select(.id=="marc@nexaduo")' > /dev/null
          echo "AUTH-BOUNDARY: plugin install SUCCEEDED with no ANTHROPIC_API_KEY."

      # 7. In-repo registration proof (fresh config dir).
      #    `list --json` exposes the installed plugin; the per-plugin component
      #    inventory (skills/agents) is exposed by `plugin details`, so we assert
      #    the plugin via `list --json | jq -e` and the skill+agents via
      #    `details` output.
      - name: Tier 2 — in-repo registration
        env:
          ANTHROPIC_API_KEY: ""
          CLAUDE_CONFIG_DIR: ${{ github.workspace }}/.marc-inrepo
        run: |
          set -euo pipefail
          mkdir -p "$CLAUDE_CONFIG_DIR"
          claude plugin marketplace add ./
          claude plugin install marc@nexaduo

          echo "== assert plugin marc@nexaduo installed (list --json | jq -e) =="
          claude plugin list --json | jq -e '.[] | select(.id=="marc@nexaduo" and .enabled==true)' > /dev/null

          echo "== assert skill + agents registered (plugin details) =="
          DETAILS="$(claude plugin details marc@nexaduo)"
          echo "$DETAILS"
          for component in tech-lead engineer sre design security; do
            echo "$DETAILS" | grep -qiw "$component" \
              || { echo "::error::component '$component' not registered in plugin details"; exit 1; }
          done
          echo "In-repo: plugin + tech-lead skill + engineer/sre/design/security agents all registered."

      # 8. Cross-repo proof: from a working directory OUTSIDE the mARC checkout,
      #    with its OWN fresh config dir, add the marketplace by pointing at the
      #    mARC checkout path and prove registration there. This is the whole
      #    point of packaging the team as a portable plugin.
      - name: Tier 2 — cross-repo registration (outside the repo)
        env:
          ANTHROPIC_API_KEY: ""
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/.marc-xrepo-cfg
          MARC_CHECKOUT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$CLAUDE_CONFIG_DIR"
          SANDBOX="$(mktemp -d "${RUNNER_TEMP}/marc-consumer-XXXXXX")"
          cd "$SANDBOX"
          echo "consumer sandbox: $SANDBOX (outside $MARC_CHECKOUT)"

          # Point the marketplace at the mARC checkout by absolute path.
          claude plugin marketplace add "$MARC_CHECKOUT"
          claude plugin install marc@nexaduo

          claude plugin list --json | jq -e '.[] | select(.id=="marc@nexaduo" and .enabled==true)' > /dev/null
          DETAILS="$(claude plugin details marc@nexaduo)"
          echo "$DETAILS"
          for component in tech-lead engineer sre design security; do
            echo "$DETAILS" | grep -qiw "$component" \
              || { echo "::error::cross-repo: component '$component' not registered"; exit 1; }
          done
          echo "Cross-repo: marc@nexaduo installs and registers from outside the mARC repo."
